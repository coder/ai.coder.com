# module.monitoring.kubernetes_config_map_v1.collector-config:
resource "kubernetes_config_map_v1" "collector-config" {
    binary_data = {}
    data        = {
        "config.river" = <<-EOT
            // Discover k8s nodes
            discovery.kubernetes "nodes" {
              role = "node"
            }
            
            // Discover k8s pods
            discovery.kubernetes "pods" {
              role = "pod"
              selectors {
