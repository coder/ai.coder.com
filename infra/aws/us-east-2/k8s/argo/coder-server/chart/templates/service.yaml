apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ include "coder.namespace" . }}
  labels:
    {{- include "coder.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- if and (eq .Values.service.type "LoadBalancer") .Values.service.loadBalancerClass }}
  loadBalancerClass: {{ .Values.service.loadBalancerClass }}
  {{- end }}
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: http
    - name: https
      port: 443
      protocol: TCP
      targetPort: {{ if .Values.tls.enabled }}https{{ else }}http{{ end }}
  selector:
    {{- include "coder.upstreamSelectorLabels" . | nindent 4 }}
---
{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-prometheus
  namespace: {{ include "coder.namespace" . }}
  labels:
    {{- include "coder.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      protocol: TCP
      port: 2112
      targetPort: 2112
  selector:
    {{- include "coder.upstreamSelectorLabels" . | nindent 4 }}
{{- end }}
