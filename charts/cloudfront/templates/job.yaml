{{- if .Values.extra.certificate.enable }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.extra.certificate.name }}-copier
  namespace: {{ .Release.Namespace }}
  annotations:
    # "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.extra.certificate.name }}-copier
  namespace: {{ .Release.Namespace }}
  annotations:
    # "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.extra.certificate.name }}-copier
  namespace: {{ .Release.Namespace }}
  annotations:
    # "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
- kind: ServiceAccount
  name: {{ .Values.extra.certificate.name }}-copier
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Values.extra.certificate.name }}-copier
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.extra.certificate.name }}-copier-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    # "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
spec:
  backoffLimit: 10
  template:
    metadata:
      name: {{ .Values.extra.certificate.name }}-copier
    spec:
      serviceAccountName: {{ .Values.extra.certificate.name }}-copier
      restartPolicy: OnFailure
      containers:
      - name: secret-copier
        # https://hub.docker.com/layers/bitnami/kubectl/latest
        image: docker.io/bitnami/kubectl@sha256:558420daf32bbc382e3e9af4537f4073085b336ddd47399a3b70e70087115978
        command:
        - /bin/bash
        - -c
        - |
          set -e

          echo "Waiting for cert-manager to create the TLS secret..."

          # Wait up to 5 minutes for the secret to exist and have data
          for i in {1..60}; do
            if kubectl get secret {{ .Values.extra.certificate.name }} -n {{ .Release.Namespace }} &>/dev/null; then
              # Check if secret has both tls.crt and tls.key
              if kubectl get secret {{ .Values.extra.certificate.name }} -n {{ .Release.Namespace }} -o jsonpath='{.data.tls\.crt}' | grep -q . && \
                 kubectl get secret {{ .Values.extra.certificate.name }} -n {{ .Release.Namespace }} -o jsonpath='{.data.tls\.key}' | grep -q .; then
                echo "Secret {{ .Values.extra.certificate.name }} is ready with certificate data"
                break
              fi
            fi
            echo "Waiting for secret... attempt $i/60"
            sleep 5
          done

          # Verify secret exists
          if ! kubectl get secret {{ .Values.extra.certificate.name }} -n {{ .Release.Namespace }} &>/dev/null; then
            echo "Error: Secret {{ .Values.extra.certificate.name }} not found after waiting"
            exit 1
          fi

          echo "Creating Opaque secret for ACM controller..."

          # Get the full certificate chain and key from the TLS secret
          TLS_CRT_FULL=$(kubectl get secret {{ .Values.extra.certificate.name }} -n {{ .Release.Namespace }} -o jsonpath='{.data.tls\.crt}' | base64 -d)
          TLS_KEY=$(kubectl get secret {{ .Values.extra.certificate.name }} -n {{ .Release.Namespace }} -o jsonpath='{.data.tls\.key}')

          # Split the certificate chain: first cert is the leaf, rest is the chain
          LEAF_CERT=$(echo "$TLS_CRT_FULL" | awk '/BEGIN CERTIFICATE/,/END CERTIFICATE/ {print; if (/END CERTIFICATE/) exit}')
          CERT_CHAIN=$(echo "$TLS_CRT_FULL" | awk '/BEGIN CERTIFICATE/,/END CERTIFICATE/ {if (p) print; if (/END CERTIFICATE/) p=1}')

          # Base64 encode for the secret
          LEAF_CERT_B64=$(echo "$LEAF_CERT" | base64 | tr -d '\n')
          CERT_CHAIN_B64=$(echo "$CERT_CHAIN" | base64 | tr -d '\n')

          # Create or update the Opaque secret with separate leaf cert and chain
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: {{ .Values.extra.certificate.name }}-opaque
            namespace: {{ .Release.Namespace }}
            labels:
              app.kubernetes.io/managed-by: {{ .Release.Service }}
              app.kubernetes.io/instance: {{ .Release.Name }}
          type: Opaque
          data:
            tls.crt: ${LEAF_CERT_B64}
            tls.chain: ${CERT_CHAIN_B64}
            tls.key: ${TLS_KEY}
          EOF

          echo "Opaque secret {{ .Values.extra.certificate.name }}-opaque created successfully"
{{- end }}
