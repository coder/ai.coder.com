apiVersion: cloudfront.services.k8s.aws/v1alpha1
kind: Distribution
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
{{- with .Values.extra.cloudfront.labels }}
  labels:
{{ toYaml . | nindent 4}}
{{- end }}
{{- with .Values.extra.cloudfront.annotations }}
  annotations:
{{ toYaml . | nindent 4}}
{{- end }}
spec:
  distributionConfig:
    priceClass: PriceClass_100
    aliases:
      items:
        - {{ .Values.extra.cloudfront.domainName }}

    comment: {{ .Values.extra.cloudfront.comment }}
    enabled: true
    defaultRootObject: {{ .Values.extra.cloudfront.defaultRootObject | default "index.html" }}
    webACLID: ""
    httpVersion: http2

    logging:
      enabled: false

    origins:
      items:
      - id: {{ .Values.extra.cloudfront.originId }}
        domainName: {{ .Values.extra.cloudfront.lbDomainName }}
        originPath: ""
        customHeaders:
          items: []
        customOriginConfig:
          httpPort: {{ .Values.extra.cloudfront.httpPort }}
          httpSPort: {{ .Values.extra.cloudfront.httpsPort }}
          originProtocolPolicy: {{ .Values.extra.cloudfront.originProtocolPolicy }}
          originSSLProtocols:
            items: ["TLSv1.2"]
          originReadTimeout: {{ .Values.extra.cloudfront.originReadTimeout | default 30 }}
          originKeepaliveTimeout:  {{ .Values.extra.cloudfront.originKeepaliveTimeout | default 5 }}

    restrictions:
      geoRestriction:
        restrictionType: none

    cacheBehaviors:
      items: []

    customErrorResponses:
      items: []

    defaultCacheBehavior:
      targetOriginID: {{ .Values.extra.cloudfront.originId }}
      viewerProtocolPolicy: {{ .Values.extra.cloudfront.viewerProtocolPolicy }}
      minTTL: {{ .Values.extra.cloudfront.minTTL }}
      defaultTTL: {{ .Values.extra.cloudfront.defaultTTL | default 86400 }}
      maxTTL: {{ .Values.extra.cloudfront.maxTTL | default 31536000 }}
      smoothStreaming: false
      compress: true
      fieldLevelEncryptionID: ""
      lambdaFunctionAssociations:
        items: []
      allowedMethods:
        items:
{{- if .Values.extra.cloudfront.allowedMethods }}
{{ toYaml .Values.extra.cloudfront.allowedMethods | nindent 8 }}
{{- else }}
        - GET
        - HEAD
        - OPTIONS
        - PUT
        - POST
        - PATCH
        - DELETE
{{- end }}
        cachedMethods:
          items:
{{- if .Values.extra.cloudfront.cachedMethods }}
{{ toYaml .Values.extra.cloudfront.cachedMethods | nindent 10 }}
{{- else }}
          - GET
          - HEAD
{{- end }}
      forwardedValues:
        queryString: true
        queryStringCacheKeys:
          items: []
        headers:
          items:
{{ toYaml (.Values.extra.cloudfront.forwardedValues.headers | default list) | nindent 10 }}
        cookies:
          forward: "all"

    viewerCertificate:
      sslSupportMethod: sni-only
      minimumProtocolVersion: TLSv1.2_2021
      acmCertificateRef:
        from:
          name: {{ .Values.extra.certificate.name }}
          namespace: {{ .Release.Namespace }}