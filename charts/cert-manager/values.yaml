extra:
  r53:
    sa:
      enable: true
      labels: {}
      annotations: {}
    role:
      enable: true
      labels: {}
      annotations: {}
    rolebinding:
      enable: true
      labels: {}
      annotations: {}
  
  defaultIssuer:
    enable: true
    name: issuer
    labels: {}
    annotations: {}
    acme:
      server: "https://acme-v02.api.letsencrypt.org/directory"
      privateKeySecretRef: 
        name: issuer-account-key
      cloudflare:
        apiTokenSecretRef:
          key: cf-token-key
          secretArn: arn:aws:secretsmanager:us-east-1:123456789012:secret:cf-token-abc123
        email: example@google.com

  secretStore:
    aws:
      region: us-east-1